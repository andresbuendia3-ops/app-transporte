<!DOCTYPE html>
<html>
<head>
  <title>Panel Conductor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .viaje {
      background: white;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .dato {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<h2>Panel Conductor</h2>

<button onclick="verViajes()">Actualizar viajes</button>

<div id="resultado"></div>

<script>

async function verViajes() {

  const response = await fetch('/api/viajes');
  const viajes = await response.json();

  let html = "";

  viajes.reverse().forEach(v => {

    html += `
      <div class="viaje">

        <div class="dato"><b>Viaje ID ${v.id}</b></div>
        <div class="dato">Origen: ${v.origen}</div>
        <div class="dato">Destino: ${v.destino}</div>
        <div class="dato">Precio: $${v.precio}</div>
        <div class="dato">Estado: ${v.estado}</div>
        <div class="dato">Oferta: ${v.oferta ? "$" + v.oferta : "Sin oferta"}</div>
    `;

    if (v.estado === "pendiente") {

      html += `
        <button onclick="aceptar(${v.id})">Aceptar viaje</button>
      `;

    }

    if (v.oferta) {

      html += `
        <button onclick="aceptarOferta(${v.id})">Aceptar oferta</button>
      `;

    }

    html += `</div>`;

  });

  document.getElementById("resultado").innerHTML = html;

}

async function aceptar(id) {

  await fetch('/api/aceptar/' + id, {
    method: 'POST'
  });

  let lat = 4.7110;
  let lng = -74.0721;

  const mover = setInterval(async () => {

    lat += 0.01;
    lng += 0.01;

    await fetch('/api/posicion/' + id, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        lat,
        lng
      })
    });

  }, 3000);

  alert("Viaje aceptado");

  verViajes();

}

async function aceptarOferta(id) {

  await fetch('/api/aceptar/' + id, {
    method: 'POST'
  });

  alert("Oferta aceptada");

  verViajes();

}

verViajes();

</script>

</body>
</html>
