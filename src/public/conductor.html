<!DOCTYPE html>
<html>
<head>
  <title>Panel Conductor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    h2 {
      font-size: 26px;
      margin: 0;
    }

    button {
      padding: 12px 16px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #333;
    }

    .viaje {
      background: white;
      padding: 18px;
      margin-bottom: 15px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      line-height: 1.6;
    }

    #resultado {
      margin-top: 25px;
    }
  </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h2>Panel Conductor</h2>
  <button onclick="cerrarSesion()" style="width:auto;">Salir</button>
</div>

<button onclick="verViajes()">Ver viajes pendientes</button>

<div id="resultado"></div>

<script>

async function verViajes() {

  const response = await fetch('/api/viajes');
  const viajes = await response.json();

  let html = "<h3>Viajes disponibles</h3>";

  viajes.forEach(v => {

    if (!v.aceptado) {

      html += `
        <div class="viaje">
          <strong>Origen:</strong> ${v.origen}<br>
          <strong>Destino:</strong> ${v.destino}<br>
          <strong>Precio:</strong> ${v.precio}<br>
          <button onclick="aceptar(${v.id})">Aceptar viaje</button>
        </div>
      `;

    }

  });

  document.getElementById("resultado").innerHTML = html;
}

async function aceptar(id) {

  await fetch('/api/aceptar/' + id, {
    method: 'POST'
  });

  document.getElementById("resultado").innerHTML =
    "<div class='viaje'>Viaje aceptado correctamente</div>";

  setTimeout(() => {
    verViajes();
  }, 1000);

}

function cerrarSesion() {
  window.location.href = "/login.html";
}

</script>

</body>
</html>
