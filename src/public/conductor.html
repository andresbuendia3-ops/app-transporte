<!DOCTYPE html>
<html>
<head>
  <title>Panel Conductor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    h2 {
      margin-bottom: 25px;
      font-size: 28px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      width: 100%;
    }

    .viaje {
      background: white;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .titulo {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .dato {
      margin-bottom: 8px;
      font-size: 15px;
    }
  </style>
</head>
<body>

<h2>Panel Conductor</h2>

<button onclick="verViajes()">Actualizar viajes</button>

<div id="resultado"></div>

<script>

async function verViajes() {

  const response = await fetch('/api/viajes');
  const viajes = await response.json();

  const viajesRecientes = viajes.reverse();

  let html = "";

  viajesRecientes.forEach(v => {

    html += `
      <div class="viaje">
        <div class="titulo">Viaje ID ${v.id}</div>

        <div class="dato">Origen: ${v.origen}</div>
        <div class="dato">Destino: ${v.destino}</div>
        <div class="dato">Precio: $${v.precio}</div>
        <div class="dato">Estado: ${v.estado}</div>
        <div class="dato">Oferta: ${v.oferta ? "$" + v.oferta : "Sin oferta"}</div>

        <button onclick="aceptar(${v.id})">Aceptar viaje</button>

        ${v.oferta ? `
          <button onclick="aceptarOferta(${v.id})">Aceptar oferta</button>
          <button onclick="rechazarOferta(${v.id})">Rechazar oferta</button>
        ` : ""}

      </div>
    `;

  });

  document.getElementById("resultado").innerHTML = html;

}

async function aceptar(id) {

  await fetch('/api/aceptar/' + id, {
    method: 'POST'
  });

  alert("Viaje aceptado");
  verViajes();

}

function aceptarOferta(id) {

  alert("Oferta aceptada en viaje " + id);

}

function rechazarOferta(id) {

  alert("Oferta rechazada en viaje " + id);

}

verViajes();

</script>

</body>
</html>
