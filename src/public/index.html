<!DOCTYPE html>
<html>
<head>
  <title>Mapa Transporte</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: white;
      padding: 20px;
      width: 320px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    input, select, button {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #resultado {
      margin-top: 15px;
      font-size: 14px;
      font-weight: bold;
      background: #f3f3f3;
      padding: 12px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="panel">
  <h3>Solicitar viaje</h3>

  <input id="origenTexto" placeholder="Origen">
  <input id="destinoTexto" placeholder="Destino">

  <select id="vehiculo">
    <option value="carro">Carro</option>
    <option value="moto">Moto</option>
    <option value="van">Van</option>
  </select>

  <button onclick="pedirViaje()">Pedir viaje</button>

  <div id="resultado"></div>
</div>

<div id="map"></div>

<script>

let map;
let directionsRenderer;
let viajeActualId = localStorage.getItem("viajeActualId");

setInterval(async () => {

  const id = localStorage.getItem("viajeActualId");

  if (!id) return;

  try {

    const responseEstado = await fetch('/api/viaje/' + id);
    const viaje = await responseEstado.json();

    console.log("WATCHER:", viaje);

    if (viaje && viaje.estado === "oferta aceptada") {

      document.getElementById("precioBox").innerHTML = `
        Precio final: $${viaje.precio}<br>
        Estado: Oferta aceptada<br>
        Conductor: ${viaje.conductor}
      `;

    }

  } catch (error) {

    console.log("watch error");

  }

}, 2000);

function initMap() {

  const centro = { lat: 4.7110, lng: -74.0721 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 8,
    center: centro
  });

  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);

  let clickCount = 0;

  map.addListener("click", function(event) {

    const lat = event.latLng.lat();
    const lng = event.latLng.lng();

    if (clickCount === 0) {
      document.getElementById("origenTexto").value = lat + "," + lng;
      clickCount++;
    } else {
      document.getElementById("destinoTexto").value = lat + "," + lng;
      clickCount = 0;
    }

  });

}

async function pedirViaje() {

  const origen = document.getElementById("origenTexto").value.trim();
  const destino = document.getElementById("destinoTexto").value.trim();
  const tipoVehiculo = document.getElementById("vehiculo").value;

  try {

    const response = await fetch('/api/distancia', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        origen,
        destino,
        tipoVehiculo
      })
    });

    const data = await response.json();

    const viajeResponse = await fetch('/api/viajes', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        origen,
        destino,
        precio: data.precio_estimado,
        conductor: data.conductor.nombre,
        vehiculo: data.conductor.tipoVehiculo
      })
    });

    const viajeGuardado = await viajeResponse.json();
    viajeActualId = viajeGuardado.id;
localStorage.setItem("viajeActualId", viajeActualId);
console.log("ID ACTUAL:", viajeActualId);
    const directionsService = new google.maps.DirectionsService();

    directionsService.route({
      origin: origen,
      destination: destino,
      travelMode: 'DRIVING'
    }, (result, status) => {

      if (status === 'OK') {
        directionsRenderer.setDirections(result);
      }

    });

    document.getElementById("resultado").innerHTML = `
      <div id="precioBox">
        Precio: $${data.precio_estimado}<br>
        Conductor: ${data.conductor.nombre}
      </div>
    `;

    if (data.precio_estimado >= 50000) {
      document.getElementById("resultado").innerHTML += `
        <br><button onclick="negociar()">Negociar viaje</button>
      `;
    }

  } catch (error) {

    document.getElementById("resultado").innerHTML = "Error backend";

  }

}

async function negociar() {

  const nuevoValor = prompt("Proponga nuevo valor");

  if (!nuevoValor) return;

  await fetch('/api/oferta/' + viajeActualId, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      oferta: parseInt(nuevoValor)
    })
  });

  document.getElementById("resultado").innerHTML += `
    <br>Oferta enviada: $${nuevoValor}
  `;

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAGjC1Eo3ldxv1wWBMDMdzkfqUZPL3TDM0&callback=initMap">
</script>

</body>
</html>
