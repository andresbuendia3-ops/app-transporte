<!DOCTYPE html>
<html>
<head>
  <title>Mapa Transporte</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: white;
      padding: 25px;
      width: 320px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    input, select, button {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 14px;
      padding: 12px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #resultado {
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
      background: #f8f9fa;
      padding: 12px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="panel">
  <h3>Solicitar viaje</h3>

  <input id="origenTexto" placeholder="Origen">
  <input id="destinoTexto" placeholder="Destino">

  <select id="vehiculo">
    <option value="carro">Carro</option>
    <option value="moto">Moto</option>
    <option value="van">Van</option>
  </select>

  <button onclick="pedirViaje()">Pedir viaje</button>

  <div id="resultado"></div>
</div>

<div id="map"></div>

<script>

let map;
let directionsRenderer;
let conductorMarker;
let viajeActualId = null;

function initMap() {

  const centro = { lat: 4.7110, lng: -74.0721 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 8,
    center: centro
  });

  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);

  conductorMarker = new google.maps.Marker({
    position: centro,
    map: map,
    title: "Conductor"
  });

}

async function pedirViaje() {

  const origen = document.getElementById("origenTexto").value.trim();
  const destino = document.getElementById("destinoTexto").value.trim();
  const tipoVehiculo = document.getElementById("vehiculo").value;

  try {

    const response = await fetch('/api/distancia', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        origen,
        destino,
        tipoVehiculo
      })
    });

    const data = await response.json();

    const viajeResponse = await fetch('/api/viajes', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        origen,
        destino,
        precio: data.precio_estimado,
        conductor: data.conductor.nombre,
        vehiculo: data.conductor.tipoVehiculo
      })
    });

    const viajeGuardado = await viajeResponse.json();
    viajeActualId = viajeGuardado.id;

    document.getElementById("resultado").innerHTML =
      "Precio: $" + data.precio_estimado +
      "<br>Conductor: " + data.conductor.nombre +
      "<br>Vehículo: " + data.conductor.tipoVehiculo;

    if (data.precio_estimado >= 50000) {

      document.getElementById("resultado").innerHTML +=
        `<br><br><button onclick="negociar()">Negociar viaje</button>`;

    }

  } catch (error) {

    document.getElementById("resultado").innerHTML = "Error backend";

  }

}

async function negociar() {

  const nuevoValor = prompt("Proponga nuevo valor");

  if (!nuevoValor) return;

  try {

    await fetch('/api/oferta/' + viajeActualId, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        oferta: parseInt(nuevoValor)
      })
    });

    document.getElementById("resultado").innerHTML +=
      "<br>Oferta enviada: $" + nuevoValor;

  } catch (error) {

    document.getElementById("resultado").innerHTML +=
      "<br>Error enviando oferta";

  }

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAGjC1Eo3ldxv1wWBMDMdzkfqUZPL3TDM0&callback=initMap">
</script>

</body>
</html>
