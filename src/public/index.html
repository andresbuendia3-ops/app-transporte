<!DOCTYPE html>
<html>
<head>
  <title>Solicitar viaje</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #panel {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: white;
      padding: 18px;
      width: 320px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: black;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #resultado {
      margin-top: 15px;
      background: #f3f3f3;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
    }
   .pac-container {
  z-index: 99999 !important;
} 
  </style>
</head>
<body>

<div id="panel">

  <h2>Solicitar viaje</h2>

 <input id="origenTexto" placeholder="¿Dónde te recogemos?">
<input id="destinoTexto" placeholder="¿A dónde vas?">

  <select id="vehiculo">
    <option value="carro">Carro</option>
    <option value="moto">Moto</option>
    <option value="van">Van</option>
  </select>

  <button onclick="pedirViaje()">Pedir viaje</button>

  <div id="resultado"></div>
<h3>Mis viajes</h3>

<div id="historial"></div>

</div>

<div id="map"></div>

<script>

console.log("SCRIPT CARGADO");

let map;
let directionsRenderer;
let viajeActualId = localStorage.getItem("viajeActualId");
console.log(
  "LOCALSTORAGE DESPUES:",
  localStorage.getItem("viajeActualId")
);
let conductorMarker;
let origenActual = "";
let destinoActual = "";
function initMap() {

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 8,
    center: { lat: 4.7110, lng: -74.0721 }
  });

  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);

  conductorMarker = new google.maps.Marker({
    position: { lat: 4.7110, lng: -74.0721 },
    map: map,
    title: "Conductor",
    icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
  });
 const origenInput = document.getElementById("origenTexto");
const destinoInput = document.getElementById("destinoTexto");

const origenAutocomplete = new google.maps.places.Autocomplete(origenInput);
const destinoAutocomplete = new google.maps.places.Autocomplete(destinoInput);

new google.maps.places.Autocomplete(destinoInput, {
  componentRestrictions: { country: "co" }
});
setInterval(actualizarConductor, 3000);
}
async function dibujarRuta(origen, destino){

  const directionsService =
    new google.maps.DirectionsService();

  directionsService.route(
    {
      origin: origen,
      destination: destino,
      travelMode: "DRIVING"
    },
    (result, status) => {

      if(status === "OK"){

        directionsRenderer.setDirections(result);

      }

    }
  );

}
async function pedirViaje() {

  const origen = document.getElementById("origenTexto").value.trim();
  const destino = document.getElementById("destinoTexto").value.trim();
  origenActual = origen;
destinoActual = destino;
  const tipoVehiculo = document.getElementById("vehiculo").value;

  try {

console.log("ENTRO A PEDIR VIAJE");
    const response = await fetch('/api/distancia', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
     
     body: JSON.stringify({
    origen,
    destino,
    tipoVehiculo,
    lat_pasajero: map.getCenter().lat(),
    lng_pasajero: map.getCenter().lng()
}) 
    });

    const data = await response.json();
console.log("DISTANCIA OK", data);

const usuario = JSON.parse(
  localStorage.getItem("usuario")
);
 const viajeResponse = await fetch('/api/viajes', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json'
  },
  body: JSON.stringify({
    origen,
    destino,
    precio: data.precio_estimado,
    vehiculo: data.conductor.tipoVehiculo,
    pasajero_id: usuario.id,
    lat_pasajero: map.getCenter().lat(),
    lng_pasajero: map.getCenter().lng()
  })
});

    console.log("STATUS VIAJE:", viajeResponse.status);

   const viajeGuardado = await viajeResponse.json();

console.log("RESPUESTA VIAJE:", viajeGuardado); 

viajeActualId = viajeGuardado.id;
localStorage.setItem("viajeActualId", viajeGuardado.id);
console.log("ID GUARDADO:", viajeGuardado.id);
   
   document.getElementById("resultado").innerHTML = `
  <div id="precioBox">

    <b>Precio:</b> $${data.precio_estimado}
    <br><br>

    <b>Conductor asignado:</b>
    ${viajeGuardado.conductor}
    <br>

    <b>ID Conductor:</b>
    ${viajeGuardado.conductor_id}
    <br><br>

    <b>Estado:</b>
    🚗 Conductor en camino

  </div>
`; 
    

    if (data.precio_estimado >= 50000) {
      document.getElementById("resultado").innerHTML += `
        <br><button onclick="negociar()">Negociar viaje</button>
      `;
    }

    const directionsService = new google.maps.DirectionsService();

    directionsService.route({
      origin: origen,
      destination: destino,
      travelMode: 'DRIVING'
    }, (result, status) => {

      if (status === 'OK') {
        directionsRenderer.setDirections(result);
      }

    }); /* ... */

/*

directionsRenderer.set('directions', null);
*/
  } catch (error) {

  console.error("ERROR PEDIR VIAJE:", error);

  document.getElementById("resultado").innerHTML =
    "Error backend: " + error.message;

}

}

async function negociar() {

  const nuevoValor = prompt("Proponga nuevo valor");

  if (!nuevoValor) return;

  await fetch('/api/oferta/' + viajeActualId, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      oferta: parseInt(nuevoValor)
    })
  });

  document.getElementById("resultado").innerHTML += `
    <br>Oferta enviada: $${nuevoValor}
  `;

}
async function actualizarConductor() {

  const viajeId = localStorage.getItem(
    "viajeActualId"
  );

  if (!viajeId) return;

  const viajeResponse = await fetch(
    '/api/viajes'
  );

  const viajes = await viajeResponse.json();

  const viaje = viajes.find(
    v => v.id == viajeId
  );

  if (!viaje) return;

  if (!viaje.conductor_id) return;

  const gpsResponse = await fetch(
    '/api/gps-conductor/' +
    viaje.conductor_id
  );

  const gps = await gpsResponse.json();

  if (!gps) return;

  if (!gps.lat || !gps.lng) return;

  conductorMarker.setPosition({
  lat: parseFloat(gps.lat),
  lng: parseFloat(gps.lng)
});
map.panTo({
  lat: parseFloat(gps.lat),
  lng: parseFloat(gps.lng)
});
}



setInterval(async () => {

  const id = localStorage.getItem("viajeActualId");

  if (!id) return;

  try {

    const responseEstado = await fetch('/api/viaje/' + id);
    const viaje = await responseEstado.json();

    console.log("WATCHER:", viaje);

    if (
  viaje &&
  (
    viaje.estado === "aceptado" ||
    viaje.estado === "recogido" ||
    viaje.estado === "finalizado"
  )
) {

  

  document.getElementById("resultado").innerHTML = `
    <div style="
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      margin-top:20px;
    ">
      <b>Precio final:</b> $${viaje.precio}<br>
      <b>Estado:</b> ${
  viaje.estado === "aceptado"
    ? "🚗 Conductor en camino"
    : viaje.estado === "recogido"
    ? "👤 Pasajero recogido"
    : "✅ Viaje finalizado"
}<br>
      <b>Conductor:</b> ${viaje.conductor}
      <br><b>ID Conductor:</b> ${viaje.conductor_id}
    </div>
  `;
console.log(
  "POSICION CONDUCTOR:",
  viaje.lat,
  viaje.lng
);
if (viaje.lat && viaje.lng) {

  const posicion = {
    lat: Number(viaje.lat),
    lng: Number(viaje.lng)
  };

  if (viaje.estado === "aceptado") {

  await dibujarRuta(
    posicion,
    origenActual
  );
}
if (viaje.estado === "recogido") {

  await dibujarRuta(
    posicion,
    viaje.destino
  );

}
  if (!conductorMarker) {

    conductorMarker = new google.maps.Marker({
      position: posicion,
      map: map,
      title: "Conductor"
    });

  } else {

    conductorMarker.setPosition(posicion);

  }

}
}

  } catch (error) {

   console.log("watch error", error);

  }

}, 2000);

</script>

<script>

async function cargarHistorial() {

  const usuario = JSON.parse(
    localStorage.getItem("usuario")
  );

  if (!usuario) return;

  const response = await fetch(
    '/api/historial/' + usuario.id
  );

  const viajes = await response.json();

  let html = "";

  viajes.forEach(v => {

    html += `
      <div style="
        background:white;
        margin:10px 0;
        padding:10px;
        border-radius:10px;
      ">
        <b>${v.origen}</b><br>
        ${v.destino}<br>
        $${v.precio}<br>
        Estado: ${v.estado}
      </div>
    `;

  });

  document.getElementById(
    "historial"
  ).innerHTML = html;

}

cargarHistorial();

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAGjC1Eo3ldxv1wWBMDMdzkfqUZPL3TDM0&libraries=places&callback=initMap">
</script>

</body>
</html>
