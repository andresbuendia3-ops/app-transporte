<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-box">

  <h2>Login Usuario</h2>

  <input id="correo" placeholder="Correo">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Entrar</button>

  <div id="resultado"></div>

</div>

<script>

async function login() {

  const correo = document.getElementById("correo").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!correo || !password) {
    document.getElementById("resultado").innerHTML = "Complete todos los campos";
    return;
  }

  try {

    const response = await fetch('/api/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        correo,
        password
      })
    });

    const data = await response.json();

    if (data.usuario) {

      if (data.usuario.rol === "pasajero") {
        window.location.href = "/index.html";
      }

      if (data.usuario.rol === "conductor") {
        window.location.href = "/conductor.html";
      }

      if (data.usuario.rol === "admin") {
        window.location.href = "/admin.html";
      }

    } else {

      document.getElementById("resultado").innerHTML =
        "Usuario o contraseña incorrectos";

    }

  } catch (error) {

    document.getElementById("resultado").innerHTML = "Error backend";

  }

}

</script>

</body>
</html>
