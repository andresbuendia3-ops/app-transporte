<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    h2 {
      font-size: 28px;
      margin: 0;
    }

    button {
      padding: 12px 18px;
      margin-right: 10px;
      margin-bottom: 25px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #333;
    }

    .bloque {
      background: white;
      padding: 18px;
      margin-bottom: 15px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      line-height: 1.7;
    }

    #resultado {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h2>Panel Administrador</h2>
  <button onclick="cerrarSesion()" style="width:auto;">Salir</button>
</div>

<button onclick="verViajes()">Ver viajes</button>
<button onclick="verUsuarios()">Ver usuarios</button>

<div id="resultado"></div>

<script>

async function verViajes() {

  let html = "<h3>Viajes registrados</h3>";

  for (let i = 25; i <= 50; i++) {

    try {

      const response = await fetch('/api/viaje/' + i);

      if (!response.ok) continue;

      const viaje = await response.json();

      if (viaje && viaje.id) {
        html += `
          <div class="bloque">
            ID: ${viaje.id}<br>
            ${viaje.origen} → ${viaje.destino}<br>
            Precio: ${viaje.precio}<br>
            Estado: ${viaje.estado}<br>
            Lat: ${viaje.lat}<br>
            Lng: ${viaje.lng}
          </div>
        `;
      }

    } catch (error) {
      continue;
    }

  }

  document.getElementById("resultado").innerHTML = html;

}

    } catch (error) {
      continue;
    }

  }

  document.getElementById("resultado").innerHTML = html;

}

async function verUsuarios() {

  try {

    const response = await fetch('/api/usuarios');
    const usuarios = await response.json();

    let html = "<h3>Usuarios registrados</h3>";

    usuarios.forEach(u => {
      html += `
        <div class="bloque">
          Nombre: ${u.nombre}<br>
          Correo: ${u.correo}<br>
          Rol: ${u.rol}
        </div>
      `;
    });

    document.getElementById("resultado").innerHTML = html;

  } catch (error) {

    document.getElementById("resultado").innerHTML = "Error cargando usuarios";

  }

}

function cerrarSesion() {
  window.location.href = "/login.html";
}

</script>

</body>
</html>
