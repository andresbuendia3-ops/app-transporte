<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      margin-right: 10px;
      margin-bottom: 20px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
    }

    .bloque {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      line-height: 1.6;
    }

    #map {
      height: 400px;
      margin-top: 20px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h2>Panel Administrador</h2>

<button onclick="verViajes()">Ver viajes</button>
<button onclick="verUsuarios()">Ver usuarios</button>

<div id="resultado"></div>
<div id="map"></div>

<script>

let map;
let marker;

function initMap() {
  const centro = { lat: 5.0315, lng: -74.0068 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 10,
    center: centro
  });

  marker = new google.maps.Marker({
    position: centro,
    map: map
  });

  setTimeout(() => {
    google.maps.event.trigger(map, "resize");
    map.setCenter(centro);
  }, 500);
}

async function verViajes() {

  try {

    const response = await fetch('/api/viajes');
    const viajes = await response.json();

    let html = "<h3>Viajes registrados</h3>";

    viajes.forEach(viaje => {

      html += `
        <div class="bloque">
          ID: ${viaje.id}<br>
          ${viaje.origen} → ${viaje.destino}<br>
          Precio: ${viaje.precio}<br>
          Estado: ${viaje.estado}<br>
          Lat: ${viaje.lat}<br>
          Lng: ${viaje.lng}
        </div>
      `;

      if (viaje.lat && viaje.lng) {
        marker.setPosition({
          lat: viaje.lat,
          lng: viaje.lng
        });

        map.setCenter({
          lat: viaje.lat,
          lng: viaje.lng
        });
      }

    });

    document.getElementById("resultado").innerHTML = html;

  } catch (error) {

    document.getElementById("resultado").innerHTML = "Error cargando viajes";

  }

}

async function verUsuarios() {

  try {

    const response = await fetch('/api/usuarios');
    const usuarios = await response.json();

    let html = "<h3>Usuarios registrados</h3>";

    usuarios.forEach(u => {

      html += `
        <div class="bloque">
          ${u.nombre}<br>
          ${u.correo}<br>
          Rol: ${u.rol}
        </div>
      `;

    });

    document.getElementById("resultado").innerHTML = html;

  } catch (error) {

    document.getElementById("resultado").innerHTML = "Error cargando usuarios";

  }

}

window.onload = function() {
  initMap();
};

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAGjC1Eo3ldxv1wWBMDMdzkfqUZPL3TDM0&callback=initMap">
</script>

</body>
</html>
